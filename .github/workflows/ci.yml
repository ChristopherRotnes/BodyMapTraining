name: CI

on:
  push:
    # Direct pushes to dev deploy to the same production slot as master.
    # This is intentional — dev acts as a pre-merge integration check.
    # If a dedicated staging slot is added later, split the triggers.
    branches:
      - master
      - dev
    paths:
      - 'app/**'
      - '.github/workflows/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
      - dev
    paths:
      - 'app/**'
      - '.github/workflows/**'

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Lint and test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: Lint
        working-directory: app
        run: npm run lint
      - name: Test with coverage
        working-directory: app
        run: npm run test:ci

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Build and deploy
    environment: ${{ github.ref == 'refs/heads/master' && 'production' || 'preview' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: Restore Vite build cache
        uses: actions/cache@v5
        with:
          path: app/node_modules/.vite
          # Keyed on deps + vite config only — source changes don't affect
          # the pre-bundled dependency cache in node_modules/.vite.
          key: vite-${{ runner.os }}-${{ hashFiles('app/package-lock.json', 'app/vite.config.js') }}
          restore-keys: vite-${{ runner.os }}-
      - name: Build app
        working-directory: app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9  # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_ISLAND_090DFD003 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "app/dist"
          api_location: "app/api"
          # "." = root of the pre-built app/dist folder. The frontend is built
          # in CI to bypass Oryx stripping VITE_* env vars. See CLAUDE.md pitfall #9.
          output_location: "."
