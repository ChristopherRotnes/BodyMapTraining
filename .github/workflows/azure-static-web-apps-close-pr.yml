name: Azure Static Web Apps — Close PR
run-name: "Cleanup staging env — ${{ github.event.pull_request.title }}"

on:
  pull_request:
    types: [closed]
    branches:
      - master
      - dev

jobs:
  close_pull_request_job:
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Close Pull Request
        id: close1
        uses: Azure/static-web-apps-deploy@v1
        continue-on-error: true
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_ISLAND_090DFD003 }}
          action: "close"

      - name: Retry close (if first attempt failed)
        if: steps.close1.outcome == 'failure'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_ISLAND_090DFD003 }}
          action: "close"
