name: Cleanup staging environment
run-name: "Cleanup staging environment"

on:
  pull_request:
    types: [closed]
    branches:
      - master
      - dev

jobs:
  close_pull_request_job:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: Close staging environment
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Close Pull Request
        id: close1
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9  # v1
        continue-on-error: true
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_ISLAND_090DFD003 }}
          action: "close"
          app_location: "app/dist"

      - name: Retry close (if first attempt failed)
        if: steps.close1.outcome == 'failure'
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9  # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_ISLAND_090DFD003 }}
          action: "close"
          app_location: "app/dist"
